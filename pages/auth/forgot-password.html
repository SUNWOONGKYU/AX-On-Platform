<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AX-On Platform 비밀번호 재설정 요청">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 110'><rect rx='20' width='100' height='110' fill='%23e8920d'/><text x='50' y='38' text-anchor='middle' dominant-baseline='central' font-family='Arial Black,Impact,sans-serif' font-weight='900' font-size='65' fill='white'>A</text><text x='50' y='74' text-anchor='middle' dominant-baseline='central' font-family='Arial Black,Impact,sans-serif' font-weight='900' font-size='65' fill='white'>X</text></svg>">
<title>비밀번호 재설정 — AX-On Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
<script src="../../js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1a1a2e;
  --ink-muted: #5a5f7d;
  --surface: #faf9f7;
  --surface-card: #ffffff;
  --amber: #e8920d;
  --amber-light: #f5b942;
  --amber-glow: rgba(232, 146, 13, 0.12);
  --success: #10b981;
  --danger: #ef4444;
  --border: rgba(26, 26, 46, 0.12);
  --radius: 20px;
  --radius-sm: 12px;
  --shadow-hover: 0 12px 40px rgba(26, 26, 46, 0.12);
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--surface);
  color: var(--ink);
  line-height: 1.7;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
  background-image: radial-gradient(ellipse at 20% 50%, rgba(232,146,13,0.06) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(13,148,136,0.05) 0%, transparent 50%);
}

.auth-card {
  background: var(--surface-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-hover);
  max-width: 440px;
  width: 100%;
  padding: 44px 40px;
  border: 1px solid var(--border);
}

.logo { text-align: center; margin-bottom: 28px; }
.logo a { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
.logo-mark {
  width: 42px; height: 42px; border-radius: 12px;
  background: linear-gradient(135deg, var(--amber), var(--amber-light));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(232,146,13,0.3);
}
.logo-text { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
.logo-text span { color: var(--amber); }

.auth-title { text-align: center; font-size: 24px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.auth-subtitle { text-align: center; font-size: 14px; color: var(--ink-muted); margin-bottom: 28px; line-height: 1.6; }

.alert {
  padding: 12px 16px; border-radius: var(--radius-sm);
  margin-bottom: 20px; font-size: 14px; display: none; line-height: 1.5;
}
.alert-error { background: rgba(239,68,68,0.08); color: #c0392b; border: 1px solid rgba(239,68,68,0.2); }
.alert-success { background: rgba(16,185,129,0.08); color: #0d7a5a; border: 1px solid rgba(16,185,129,0.2); }

.form-group { margin-bottom: 20px; }
.form-label { display: block; margin-bottom: 7px; font-size: 14px; font-weight: 600; color: var(--ink); }
.form-input {
  width: 100%; padding: 13px 16px;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-size: 15px; font-family: 'Noto Sans KR', sans-serif; color: var(--ink);
  background: var(--surface); transition: border-color 0.2s, box-shadow 0.2s; outline: none;
}
.form-input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-glow); background: #fff; }
.form-input::placeholder { color: #aab0c4; }

.btn-primary {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--amber), var(--amber-light));
  color: #fff; border: none; border-radius: var(--radius-sm);
  font-size: 16px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(232,146,13,0.3); margin-top: 8px;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,146,13,0.4); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { background: #d1d5db; box-shadow: none; cursor: not-allowed; transform: none; }

.auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: var(--ink-muted); }
.auth-footer a { color: var(--amber); text-decoration: none; font-weight: 600; }
.auth-footer a:hover { text-decoration: underline; }

/* 성공 화면 */
.success-view { text-align: center; display: none; }
.success-icon {
  width: 80px; height: 80px; background: var(--success);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  box-shadow: 0 8px 24px rgba(16,185,129,0.3);
}
.success-icon svg { width: 40px; height: 40px; fill: white; }
.success-title { font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 10px; }
.success-message { color: var(--ink-muted); font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
.btn-back {
  display: inline-block; padding: 12px 32px;
  background: linear-gradient(135deg, var(--amber), var(--amber-light));
  color: #fff; text-decoration: none; border-radius: var(--radius-sm);
  font-weight: 700; font-size: 15px; transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(232,146,13,0.3);
}
.btn-back:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,146,13,0.4); }

/* Loading */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(250,249,247,0.85);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}
.spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(232,146,13,0.15); border-top: 4px solid var(--amber);
  border-radius: 50%; animation: spin 0.9s linear infinite;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

@media (max-width: 480px) {
  .auth-card { padding: 32px 24px; }
  .auth-title { font-size: 21px; }
}
</style>
</head>
<body>
<div class="auth-card">
  <div class="logo">
    <a href="../../index.html">
      <div class="logo-mark">
        <svg width="26" height="26" viewBox="0 0 40 44">
          <text x="20" y="16" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="28" fill="white">A</text>
          <text x="20" y="30" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="28" fill="white">X</text>
        </svg>
      </div>
      <span class="logo-text">AX-<span>On</span></span>
    </a>
  </div>

  <!-- 요청 폼 -->
  <div id="requestForm">
    <h1 class="auth-title">비밀번호 재설정</h1>
    <p class="auth-subtitle">가입 시 사용하신 이메일 주소를 입력해주세요.<br>비밀번호 재설정 링크를 보내드립니다.</p>

    <div id="alertMessage" class="alert" role="alert"></div>

    <form onsubmit="handleForgotPassword(event)">
      <div class="form-group">
        <label class="form-label" for="email">이메일</label>
        <input class="form-input" type="email" id="email" name="email" required placeholder="example@email.com" autocomplete="email">
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">재설정 링크 받기</button>
    </form>

    <div class="auth-footer">
      <a href="login.html">로그인 페이지로 돌아가기</a>
    </div>
  </div>

  <!-- 성공 화면 -->
  <div id="successView" class="success-view">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    </div>
    <h2 class="success-title">이메일이 전송되었습니다</h2>
    <p class="success-message" id="successEmailMsg"></p>
    <p class="success-message">이메일을 확인하여 비밀번호 재설정 링크를 클릭해주세요.<br>(스팸함도 확인해주세요)</p>
    <a href="login.html" class="btn-back">로그인하기</a>
  </div>
</div>

<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
</div>

<script>
  const { createClient } = supabase;
  const supabaseClient = createClient(AXON_CONFIG.SUPABASE_URL, AXON_CONFIG.SUPABASE_ANON_KEY);

  let isSubmitting = false;

  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function showAlert(message, type = 'error') {
    const el = document.getElementById('alertMessage');
    el.textContent = message;
    el.className = `alert alert-${type}`;
    el.style.display = 'block';
    if (type === 'error') setTimeout(() => { el.style.display = 'none'; }, 5000);
  }

  function showLoading() {
    document.getElementById('loadingOverlay').style.display = 'flex';
    document.getElementById('submitBtn').disabled = true;
  }

  function hideLoading() {
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('submitBtn').disabled = false;
  }

  async function handleForgotPassword(event) {
    event.preventDefault();
    if (isSubmitting) return; isSubmitting = true;
    const email = document.getElementById('email').value.trim();
    if (!email) { showAlert('이메일을 입력하세요.'); isSubmitting = false; return; }
    if (!isValidEmail(email)) { showAlert('올바른 이메일 형식을 입력하세요.'); isSubmitting = false; return; }

    try {
      showLoading();
      // H-2: 서브디렉토리 환경에서도 올바른 경로 생성
      const redirectTo = window.location.href.replace(/\/pages\/auth\/.*$/, '/pages/auth/reset-password.html');
      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo
      });
      if (error) throw error;

      hideLoading();
      document.getElementById('requestForm').style.display = 'none';
      document.getElementById('successEmailMsg').textContent = `${email} 주소로 링크를 발송했습니다.`;
      document.getElementById('successView').style.display = 'block';

    } catch (error) {
      hideLoading();
      isSubmitting = false;
      // H-7: 에러 유형별 메시지 분기
      if (error.status === 429 || error.message?.includes('rate')) {
        showAlert('너무 많은 요청입니다. 잠시 후 다시 시도해주세요.');
      } else if (error.message?.includes('fetch') || error.message?.includes('network')) {
        showAlert('네트워크 오류가 발생했습니다. 인터넷 연결을 확인하고 다시 시도해주세요.');
      } else {
        showAlert('전송에 실패했습니다. 이메일 주소를 확인하고 다시 시도해주세요.');
      }
    }
  }
</script>
</body>
</html>
