<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AX-On Platform 비밀번호 재설정">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 110'><rect rx='20' width='100' height='110' fill='%23e8920d'/><text x='50' y='38' text-anchor='middle' dominant-baseline='central' font-family='Arial Black,Impact,sans-serif' font-weight='900' font-size='65' fill='white'>A</text><text x='50' y='74' text-anchor='middle' dominant-baseline='central' font-family='Arial Black,Impact,sans-serif' font-weight='900' font-size='65' fill='white'>X</text></svg>">
<title>비밀번호 변경 — AX-On Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
<script src="../../js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1a1a2e;
  --ink-muted: #5a5f7d;
  --surface: #faf9f7;
  --surface-card: #ffffff;
  --amber: #e8920d;
  --amber-light: #f5b942;
  --amber-glow: rgba(232, 146, 13, 0.12);
  --success: #10b981;
  --danger: #ef4444;
  --border: rgba(26, 26, 46, 0.12);
  --radius: 20px;
  --radius-sm: 12px;
  --shadow-hover: 0 12px 40px rgba(26, 26, 46, 0.12);
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--surface);
  color: var(--ink);
  line-height: 1.7;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
  background-image: radial-gradient(ellipse at 20% 50%, rgba(232,146,13,0.06) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(13,148,136,0.05) 0%, transparent 50%);
}

.auth-card {
  background: var(--surface-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-hover);
  max-width: 440px;
  width: 100%;
  padding: 44px 40px;
  border: 1px solid var(--border);
}

.logo { text-align: center; margin-bottom: 28px; }
.logo a { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
.logo-mark {
  width: 42px; height: 42px; border-radius: 12px;
  background: linear-gradient(135deg, var(--amber), var(--amber-light));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(232,146,13,0.3);
}
.logo-text { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
.logo-text span { color: var(--amber); }

.auth-title { text-align: center; font-size: 24px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.auth-subtitle { text-align: center; font-size: 14px; color: var(--ink-muted); margin-bottom: 28px; }

.alert {
  padding: 12px 16px; border-radius: var(--radius-sm);
  margin-bottom: 20px; font-size: 14px; display: none; line-height: 1.5;
}
.alert-error { background: rgba(239,68,68,0.08); color: #c0392b; border: 1px solid rgba(239,68,68,0.2); }
.alert-success { background: rgba(16,185,129,0.08); color: #0d7a5a; border: 1px solid rgba(16,185,129,0.2); }

.form-group { margin-bottom: 18px; }
.form-label { display: block; margin-bottom: 7px; font-size: 14px; font-weight: 600; color: var(--ink); }
.form-input {
  width: 100%; padding: 13px 16px;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-size: 15px; font-family: 'Noto Sans KR', sans-serif; color: var(--ink);
  background: var(--surface); transition: border-color 0.2s, box-shadow 0.2s; outline: none;
}
.form-input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-glow); background: #fff; }
.form-input::placeholder { color: #aab0c4; }

.pw-wrapper { position: relative; }
.pw-wrapper .form-input { padding-right: 44px; }
.pw-toggle {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; padding: 4px;
  color: var(--ink-muted); font-size: 18px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
}
.pw-toggle:hover { color: var(--ink); }

/* 비밀번호 요구사항 */
.pw-requirements { margin-top: 8px; }
.pw-requirements ul { padding-left: 18px; }
.pw-requirements li {
  font-size: 12px; color: var(--ink-muted); margin-bottom: 2px;
  transition: color 0.2s;
}
.pw-requirements li.valid { color: var(--success); }
.pw-requirements li.invalid { color: var(--danger); }

.match-msg { margin-top: 6px; font-size: 12px; }

.btn-primary {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--amber), var(--amber-light));
  color: #fff; border: none; border-radius: var(--radius-sm);
  font-size: 16px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(232,146,13,0.3); margin-top: 8px;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,146,13,0.4); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { background: #d1d5db; box-shadow: none; cursor: not-allowed; transform: none; }

.auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: var(--ink-muted); }
.auth-footer a { color: var(--amber); text-decoration: none; font-weight: 600; }
.auth-footer a:hover { text-decoration: underline; }

/* 성공 화면 */
.success-view { text-align: center; display: none; }
.success-icon {
  width: 80px; height: 80px; background: var(--success);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px; box-shadow: 0 8px 24px rgba(16,185,129,0.3);
}
.success-icon svg { width: 40px; height: 40px; fill: white; }
.success-title { font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 10px; }
.success-message { color: var(--ink-muted); font-size: 14px; margin-bottom: 24px; }
.btn-back {
  display: inline-block; padding: 12px 32px;
  background: linear-gradient(135deg, var(--amber), var(--amber-light));
  color: #fff; text-decoration: none; border-radius: var(--radius-sm);
  font-weight: 700; font-size: 15px; transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(232,146,13,0.3);
}
.btn-back:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,146,13,0.4); }

/* Loading */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(250,249,247,0.85);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}
.spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(232,146,13,0.15); border-top: 4px solid var(--amber);
  border-radius: 50%; animation: spin 0.9s linear infinite;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

@media (max-width: 480px) {
  .auth-card { padding: 32px 24px; }
  .auth-title { font-size: 21px; }
}
</style>
</head>
<body>
<div class="auth-card">
  <div class="logo">
    <a href="../../index.html">
      <div class="logo-mark">
        <svg width="26" height="26" viewBox="0 0 40 44">
          <text x="20" y="16" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="28" fill="white">A</text>
          <text x="20" y="30" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="28" fill="white">X</text>
        </svg>
      </div>
      <span class="logo-text">AX-<span>On</span></span>
    </a>
  </div>

  <!-- 비밀번호 재설정 폼 -->
  <div id="resetForm">
    <h1 class="auth-title">비밀번호 변경</h1>
    <p class="auth-subtitle">새로운 비밀번호를 입력해주세요</p>

    <div id="alertMessage" class="alert" role="alert"></div>

    <form onsubmit="handleResetPassword(event)">
      <div class="form-group">
        <label class="form-label" for="newPassword">새 비밀번호</label>
        <div class="pw-wrapper">
          <input class="form-input" type="password" id="newPassword" name="new-password" required placeholder="새 비밀번호 입력" autocomplete="new-password" oninput="checkPasswordStrength()">
          <button type="button" class="pw-toggle" onclick="togglePassword('newPassword', this)" title="비밀번호 표시" aria-label="비밀번호 표시" aria-pressed="false">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="pw-requirements">
          <ul>
            <li id="req-length">최소 8자 이상</li>
            <li id="req-letter">영문자 포함</li>
            <li id="req-number">숫자 포함</li>
          </ul>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">비밀번호 확인</label>
        <div class="pw-wrapper">
          <input class="form-input" type="password" id="confirmPassword" name="confirm-password" required placeholder="비밀번호 다시 입력" autocomplete="new-password" oninput="checkPasswordMatch()">
          <button type="button" class="pw-toggle" onclick="togglePassword('confirmPassword', this)" title="비밀번호 표시" aria-label="비밀번호 표시" aria-pressed="false">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div id="matchMsg" class="match-msg"></div>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn" disabled>비밀번호 변경</button>
    </form>

    <div class="auth-footer">
      <a href="login.html">로그인 페이지로 돌아가기</a>
    </div>
  </div>

  <!-- 성공 화면 -->
  <div id="successView" class="success-view">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    </div>
    <h2 class="success-title">비밀번호가 변경되었습니다</h2>
    <p class="success-message">새 비밀번호로 로그인하실 수 있습니다.</p>
    <a href="login.html" class="btn-back">로그인하기</a>
  </div>
</div>

<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
</div>

<script>
  const { createClient } = supabase;
  const supabaseClient = createClient(AXON_CONFIG.SUPABASE_URL, AXON_CONFIG.SUPABASE_ANON_KEY);

  let isRecoverySession = false;

  // ── 비밀번호 표시 토글 ──
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    btn.title = isPassword ? '비밀번호 숨기기' : '비밀번호 표시';
    btn.setAttribute('aria-label', isPassword ? '비밀번호 숨기기' : '비밀번호 표시');
    btn.setAttribute('aria-pressed', String(isPassword));
    btn.innerHTML = isPassword
      ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
      : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  }

  function showAlert(message, type = 'error') {
    const el = document.getElementById('alertMessage');
    el.textContent = message;
    el.className = `alert alert-${type}`;
    el.style.display = 'block';
    if (type === 'error') setTimeout(() => { el.style.display = 'none'; }, 6000);
  }

  function showLoading() {
    document.getElementById('loadingOverlay').style.display = 'flex';
    document.getElementById('submitBtn').disabled = true;
  }

  function hideLoading() {
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('submitBtn').disabled = false;
  }

  function checkPasswordStrength() {
    const pw = document.getElementById('newPassword').value;
    const setReq = (id, valid) => {
      const el = document.getElementById(id);
      el.className = valid ? 'valid' : (pw ? 'invalid' : '');
    };
    setReq('req-length', pw.length >= 8);
    setReq('req-letter', /[a-zA-Z]/.test(pw));
    setReq('req-number', /[0-9]/.test(pw));
    checkPasswordMatch();
  }

  function checkPasswordMatch() {
    const pw = document.getElementById('newPassword').value;
    const conf = document.getElementById('confirmPassword').value;
    const msg = document.getElementById('matchMsg');
    const submitBtn = document.getElementById('submitBtn');
    if (!conf) {
      msg.textContent = '';
      // H-8: 비밀번호 확인 미입력 시 버튼 비활성화
      submitBtn.disabled = !isPasswordValid() || !conf;
      return;
    }
    if (pw === conf) {
      msg.textContent = '비밀번호가 일치합니다';
      msg.style.color = 'var(--success)';
      // H-8: 비밀번호 일치 + 유효할 때만 버튼 활성화
      submitBtn.disabled = !isPasswordValid();
    } else {
      msg.textContent = '비밀번호가 일치하지 않습니다';
      msg.style.color = 'var(--danger)';
      // H-8: 비밀번호 불일치 시 버튼 비활성화
      submitBtn.disabled = true;
    }
  }

  function isPasswordValid() {
    const pw = document.getElementById('newPassword').value;
    return pw.length >= 8 && /[a-zA-Z]/.test(pw) && /[0-9]/.test(pw);
  }

  async function handleResetPassword(event) {
    event.preventDefault();
    if (!isRecoverySession) {
      showAlert('유효한 세션이 없습니다. 비밀번호 재설정 링크를 다시 요청해주세요.');
      return;
    }
    if (!isPasswordValid()) { showAlert('비밀번호 요구사항을 모두 충족해야 합니다.'); return; }
    const pw = document.getElementById('newPassword').value;
    const conf = document.getElementById('confirmPassword').value;
    if (pw !== conf) { showAlert('비밀번호가 일치하지 않습니다.'); return; }

    try {
      showLoading();
      const { error } = await supabaseClient.auth.updateUser({ password: pw });
      if (error) throw error;
      await supabaseClient.auth.signOut();
      hideLoading();
      document.getElementById('resetForm').style.display = 'none';
      document.getElementById('successView').style.display = 'block';
    } catch (error) {
      hideLoading();
      if (error.message.includes('Auth session missing')) {
        showAlert('세션이 만료되었습니다. 비밀번호 재설정을 다시 요청해주세요.');
        setTimeout(() => { window.location.href = 'forgot-password.html'; }, 3000);
      } else if (error.message.includes('same_password')) {
        showAlert('새 비밀번호는 기존 비밀번호와 달라야 합니다.');
      } else {
        showAlert('비밀번호 변경에 실패했습니다. 잠시 후 다시 시도해주세요.');
      }
    }
  }

  document.addEventListener('DOMContentLoaded', async () => {
    // H-5: URL에서 복구 관련 파라미터 확인 (해시 토큰 또는 PKCE code)
    const hash = window.location.hash;
    const hasRecoveryIndicator = hash.includes('access_token') || hash.includes('type=recovery') || window.location.search.includes('code=');

    // H-6: 기존 세션이 있더라도 복구 관련 URL 파라미터가 있을 때만 허용
    const { data: { session: existingSession } } = await supabaseClient.auth.getSession();
    if (existingSession && hasRecoveryIndicator) {
      isRecoverySession = true;
      document.getElementById('submitBtn').disabled = false;
      showAlert('새 비밀번호를 입력해주세요.', 'success');
    }

    // 이벤트 기반으로 세션 변경 감지 (리다이렉트 후 토큰 교환 완료 시)
    const { data: { subscription } } = supabaseClient.auth.onAuthStateChange(async (event, session) => {
      // C-6: PASSWORD_RECOVERY 이벤트만 허용 (SIGNED_IN은 일반 로그인에서도 발생)
      if (event === 'PASSWORD_RECOVERY') {
        isRecoverySession = true;
        document.getElementById('submitBtn').disabled = false;
        showAlert('새 비밀번호를 입력해주세요.', 'success');
        // C-5: 복구 세션 확인 후 구독 해제 (메모리 누수 방지)
        subscription.unsubscribe();
      } else if (event === 'TOKEN_REFRESHED' && session && hasRecoveryIndicator) {
        isRecoverySession = true;
        document.getElementById('submitBtn').disabled = false;
        subscription.unsubscribe();
      }
    });

    // URL에 토큰 파라미터가 있는데 세션이 없으면 안내 메시지 표시
    if (!existingSession && !hasRecoveryIndicator) {
      showAlert('유효하지 않은 링크입니다. 비밀번호 재설정을 다시 요청해주세요.');
    }
  });
</script>
</body>
</html>
