<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AX-On Platform 로그인">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 110'><rect rx='20' width='100' height='110' fill='%23e8920d'/><text x='50' y='38' text-anchor='middle' dominant-baseline='central' font-family='Arial Black,Impact,sans-serif' font-weight='900' font-size='65' fill='white'>A</text><text x='50' y='74' text-anchor='middle' dominant-baseline='central' font-family='Arial Black,Impact,sans-serif' font-weight='900' font-size='65' fill='white'>X</text></svg>">
<title>로그인 — AX-On Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
<script src="../../js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1a1a2e;
  --ink-muted: #5a5f7d;
  --surface: #faf9f7;
  --surface-warm: #f5f0eb;
  --surface-card: #ffffff;
  --amber: #e8920d;
  --amber-light: #f5b942;
  --amber-glow: rgba(232, 146, 13, 0.12);
  --teal: #0d9488;
  --success: #10b981;
  --danger: #ef4444;
  --border: rgba(26, 26, 46, 0.12);
  --radius: 20px;
  --radius-sm: 12px;
  --shadow-soft: 0 4px 24px rgba(26, 26, 46, 0.06);
  --shadow-hover: 0 12px 40px rgba(26, 26, 46, 0.12);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--surface);
  color: var(--ink);
  line-height: 1.7;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
  background-image: radial-gradient(ellipse at 20% 50%, rgba(232, 146, 13, 0.06) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(13, 148, 136, 0.05) 0%, transparent 50%);
}

.auth-card {
  background: var(--surface-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-hover);
  max-width: 440px;
  width: 100%;
  padding: 44px 40px;
  border: 1px solid var(--border);
}

/* Logo */
.logo {
  text-align: center;
  margin-bottom: 28px;
}
.logo a {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--ink);
}
.logo-mark {
  width: 42px; height: 42px; border-radius: 12px;
  background: linear-gradient(135deg, var(--amber), var(--amber-light));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(232, 146, 13, 0.3);
}
.logo-text {
  font-family: 'Outfit', sans-serif;
  font-weight: 800; font-size: 22px;
  letter-spacing: -0.5px;
}
.logo-text span { color: var(--amber); }

.auth-title {
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
}
.auth-subtitle {
  text-align: center;
  font-size: 14px;
  color: var(--ink-muted);
  margin-bottom: 28px;
}

/* Alert */
.alert {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  margin-bottom: 20px;
  font-size: 14px;
  display: none;
  line-height: 1.5;
}
.alert-error {
  background: rgba(239, 68, 68, 0.08);
  color: #c0392b;
  border: 1px solid rgba(239, 68, 68, 0.2);
}
.alert-success {
  background: rgba(16, 185, 129, 0.08);
  color: #0d7a5a;
  border: 1px solid rgba(16, 185, 129, 0.2);
}

/* Form */
.form-group {
  margin-bottom: 18px;
}
.form-label {
  display: block;
  margin-bottom: 7px;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
}
.form-input {
  width: 100%;
  padding: 13px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--ink);
  background: var(--surface);
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
.form-input:focus {
  border-color: var(--amber);
  box-shadow: 0 0 0 3px var(--amber-glow);
  background: #fff;
}
.form-input::placeholder { color: #aab0c4; }
.required { color: #e74c3c; margin-left: 2px; }

.pw-wrapper { position: relative; }
.pw-wrapper .form-input { padding-right: 44px; }
.pw-toggle {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; padding: 4px;
  color: var(--ink-muted); font-size: 18px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
}
.pw-toggle:hover { color: var(--ink); }

.remember-forgot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 22px;
  font-size: 13px;
}
.remember-me {
  display: flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
}
.remember-me input[type="checkbox"] {
  width: 16px; height: 16px;
  accent-color: var(--amber);
  cursor: pointer;
}
.remember-me label {
  color: var(--ink-muted);
  cursor: pointer;
  font-size: 13px;
}
.forgot-link {
  color: var(--amber);
  text-decoration: none;
  font-weight: 500;
  font-size: 13px;
}
.forgot-link:hover { text-decoration: underline; }

/* Buttons */
.btn-primary {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--amber), var(--amber-light));
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(232, 146, 13, 0.3);
  letter-spacing: -0.2px;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(232, 146, 13, 0.4);
}
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled {
  background: #d1d5db;
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
}

.divider {
  display: flex;
  align-items: center;
  margin: 20px 0;
  gap: 12px;
  color: var(--ink-muted);
  font-size: 13px;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.btn-google {
  width: 100%;
  padding: 13px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: #fff;
  font-size: 15px;
  font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--ink);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
}
.btn-google:hover {
  background: var(--surface);
  border-color: rgba(26, 26, 46, 0.2);
  box-shadow: var(--shadow-soft);
}

.auth-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 14px;
  color: var(--ink-muted);
}
.auth-footer a {
  color: var(--amber);
  text-decoration: none;
  font-weight: 600;
}
.auth-footer a:hover { text-decoration: underline; }

/* Loading Overlay */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(250, 249, 247, 0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(232, 146, 13, 0.15);
  border-top: 4px solid var(--amber);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@media (max-width: 480px) {
  .auth-card { padding: 32px 24px; }
  .auth-title { font-size: 21px; }
}
</style>
</head>
<body>
<div class="auth-card">
  <div class="logo">
    <a href="../../index.html">
      <div class="logo-mark">
        <svg width="26" height="26" viewBox="0 0 40 44">
          <text x="20" y="16" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="28" fill="white">A</text>
          <text x="20" y="30" text-anchor="middle" dominant-baseline="central" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="28" fill="white">X</text>
        </svg>
      </div>
      <span class="logo-text">AX-<span>On</span></span>
    </a>
  </div>

  <h1 class="auth-title">로그인</h1>
  <p class="auth-subtitle">AX-On Platform에 오신 것을 환영합니다</p>

  <div id="alertMessage" class="alert"></div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label" for="email">이메일 <span class="required">*</span></label>
      <input class="form-input" type="email" id="email" required placeholder="example@email.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label" for="password">비밀번호 <span class="required">*</span></label>
      <div class="pw-wrapper">
        <input class="form-input" type="password" id="password" required placeholder="비밀번호 입력" autocomplete="current-password">
        <button type="button" class="pw-toggle" onclick="togglePassword('password', this)" title="비밀번호 표시" aria-label="비밀번호 표시" aria-pressed="false">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <div class="remember-forgot">
      <div class="remember-me">
        <input type="checkbox" id="rememberMe">
        <label for="rememberMe">로그인 상태 유지</label>
      </div>
      <a href="forgot-password.html" class="forgot-link">비밀번호를 잊으셨나요?</a>
    </div>

    <button type="submit" class="btn-primary" id="submitBtn">로그인</button>
  </form>

  <div class="divider">또는</div>

  <button type="button" class="btn-google" onclick="handleGoogleLogin()">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Google로 로그인
  </button>

  <div class="auth-footer">
    계정이 없으신가요? <a href="signup.html">회원가입</a>
  </div>
</div>

<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<script>
  // ── Supabase 초기화 ──
  const { createClient } = supabase;
  const supabaseClient = createClient(AXON_CONFIG.SUPABASE_URL, AXON_CONFIG.SUPABASE_ANON_KEY);

  // ── 유틸리티 ──
  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function showAlert(message, type = 'error') {
    const el = document.getElementById('alertMessage');
    el.textContent = message;
    el.className = `alert alert-${type}`;
    el.style.display = 'block';
    if (type === 'error') {
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }
  }

  function showLoading() {
    document.getElementById('loadingOverlay').style.display = 'flex';
    document.getElementById('submitBtn').disabled = true;
  }

  function hideLoading() {
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('submitBtn').disabled = false;
  }

  // ── 비밀번호 표시 토글 ──
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    btn.title = isPassword ? '비밀번호 숨기기' : '비밀번호 표시';
    btn.setAttribute('aria-label', isPassword ? '비밀번호 숨기기' : '비밀번호 표시');
    btn.setAttribute('aria-pressed', String(isPassword));
    btn.innerHTML = isPassword
      ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
      : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  }

  // ── 로그인 ──
  async function handleLogin(event) {
    event.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const rememberMe = document.getElementById('rememberMe').checked;

    if (!email || !password) {
      showAlert('이메일과 비밀번호를 입력하세요.');
      return;
    }
    if (!isValidEmail(email)) { showAlert('올바른 이메일 형식을 입력하세요.'); return; }

    try {
      showLoading();
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) throw error;

      if (rememberMe) {
        localStorage.setItem('ax_remember_email', email);
      } else {
        localStorage.removeItem('ax_remember_email');
      }

      hideLoading();
      showAlert('로그인 성공! 이동 중...', 'success');
      setTimeout(() => { window.location.href = '../../index.html'; }, 1000);

    } catch (error) {
      hideLoading();
      if (error.message.includes('Invalid login credentials')) {
        showAlert('이메일 또는 비밀번호가 올바르지 않습니다.');
      } else if (error.message.includes('Email not confirmed')) {
        showAlert('이메일 인증이 완료되지 않았습니다. 이메일을 확인해주세요.');
      } else if (error.message.includes('rate limit') || error.status === 429) {
        showAlert('로그인 시도가 너무 많습니다. 잠시 후 다시 시도해주세요.');
      } else if (error.message.includes('User not found')) {
        showAlert('등록되지 않은 이메일입니다. 회원가입을 먼저 해주세요.');
      } else {
        showAlert('로그인에 실패했습니다. 잠시 후 다시 시도해주세요.');
      }
    }
  }

  // ── Google OAuth ──
  async function handleGoogleLogin() {
    if (window.location.protocol === 'file:') {
      showAlert('Google 로그인은 웹 서버 환경에서만 사용 가능합니다. (file:// 프로토콜 미지원)');
      return;
    }
    try {
      showLoading();
      const redirectUrl = window.location.origin + '/index.html';
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: redirectUrl }
      });
      if (error) throw error;
    } catch (error) {
      hideLoading();
      showAlert('Google 로그인에 실패했습니다. 잠시 후 다시 시도해주세요.');
    }
  }

  // ── 페이지 로드 ──
  document.addEventListener('DOMContentLoaded', async () => {
    const savedEmail = localStorage.getItem('ax_remember_email');
    if (savedEmail) {
      document.getElementById('email').value = savedEmail;
      document.getElementById('rememberMe').checked = true;
    }

    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      window.location.href = '../../index.html';
    }
  });
</script>
</body>
</html>
